<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 48px 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 24px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .logo p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            font-size: 15px;
            color: #fff;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a9eff;
            background: #1a1a1a;
        }

        .form-group input::placeholder {
            color: #555;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4a9eff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #3a8eef;
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #4a9eff;
        }

        .hint {
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.3);
            color: #4a9eff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .hint strong {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>🔐 Admin Login</h1>
            <p>Mô Hình Cao Cấp</p>
        </div>

        <div class="hint">
            <strong>Thông tin đăng nhập:</strong>
            Email: admin@mohinhcaocap.vn<br>
            Mật khẩu: admin123
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="admin@mohinhcaocap.vn"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="form-group">
                <label>Mật Khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Nhập mật khẩu"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Đăng Nhập
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">← Quay về trang chủ</a>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';

        // Check if already logged in
        const token = localStorage.getItem('admin_token');
        if (token) {
            window.location.href = 'admin-products.html';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Vui lòng nhập đầy đủ thông tin!');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang đăng nhập...';

            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.success && data.data && data.data.token) {
                    // Save token
                    localStorage.setItem('admin_token', data.data.token);
                    
                    // Show success
                    loginBtn.textContent = '✓ Thành công!';
                    loginBtn.style.background = '#10b981';
                    
                    // Redirect
                    setTimeout(() => {
                        window.location.href = 'admin-products.html';
                    }, 500);
                } else {
                    showError(data.message || 'Email hoặc mật khẩu không đúng!');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Đăng Nhập';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Lỗi kết nối! Vui lòng kiểm tra server đang chạy.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng Nhập';
            }
        });
    </script>
</body>
</html>
